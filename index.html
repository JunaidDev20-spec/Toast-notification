<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <script src="https://cdn.tailwindcss.com"></script>
      
</head>
<body>
      <main class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
            <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
                  <h1 class="text-2xl font-bold text-slate-800">Toast Notification</h1>
                  <p class="text-slate-500 mt-2">Click the button to show a decent toast.</p>
                  <button
                        id="showToastBtn"
                        class="mt-6 inline-flex items-center justify-center rounded-lg bg-indigo-600 px-5 py-3 text-white font-medium hover:bg-indigo-700 active:scale-[0.98] transition"
                  >
                        Show Toast
                  </button>
            </div>
      </main>
   
     <div class="parent fixed top-5 right-5 flex flex-col gap-2 z-50">
      <div id="toastContainer" class="inline-block bg-gray-800 text-white px-6 py-3 rounded shadow-lg pointer-events-none transition-opacity duration-300"></div>

      </div>
     
   
      <script src="script.js"></script>
</body>
</html>
